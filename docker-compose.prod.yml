services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-metrics}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      SERVER_PORT: 3333
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  collector:
    build:
      context: .
      dockerfile: apps/metrics-collector/Dockerfile
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bullboard:
    build:
      context: .
      dockerfile: packages/infra/Dockerfile
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BULL_BOARD_PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: packages/infra/Dockerfile
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    entrypoint: ["pnpm", "--filter", "@best-lap/infra", "run", "db:seed"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: