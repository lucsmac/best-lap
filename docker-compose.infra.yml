services:
  # =============================================================================
  # Infrastructure Services Only - For Local Development
  # =============================================================================
  
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: best-lap-timescaledb
    environment:
      POSTGRES_DB: best_lap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d best_lap"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - best-lap-network

  redis:
    image: redis:7-alpine
    container_name: best-lap-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - best-lap-network

# =============================================================================
# Networks and Volumes
# =============================================================================

networks:
  best-lap-network:
    driver: bridge

volumes:
  timescaledb_data:
    driver: local
  redis_data:
    driver: local